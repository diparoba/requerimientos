<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PhysioCare | Fisioterapia Avanzada</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body>
    <nav class="navbar">
        <div class="logo">PhysioCare</div>
        <ul>
            <li><a href="#inicio">Inicio</a></li>
            <li><a href="#dolor">Nivel de Dolor</a></li>
            <li><a href="#ejercicios">Ejercicios</a></li>
            <li><a href="#contacto">Contacto</a></li>
        </ul>

    </nav>

    <header id="inicio" class="hero small">
        <div class="hero-content">
            <h1>PhysioCare</h1>
            <p>Bienvenido a tu centro de rehabilitación física digital.</p>
        </div>
    </header>

    <section id="dolor" class="section">
        <h2>¿Cuánto dolor sientes hoy?</h2>
        <p>Selecciona tu nivel de dolor en una escala del 1 al 10.</p>
        <div class="pain-scale">
            <button onclick="setPain(1)">1</button>
            <button onclick="setPain(2)">2</button>
            <button onclick="setPain(3)">3</button>
            <button onclick="setPain(4)">4</button>
            <button onclick="setPain(5)">5</button>
            <button onclick="setPain(6)">6</button>
            <button onclick="setPain(7)">7</button>
            <button onclick="setPain(8)">8</button>
            <button onclick="setPain(9)">9</button>
            <button onclick="setPain(10)">10</button>
        </div>
        <div id="pain-status" class="status-msg"></div>
    </section>

    <section id="ejercicios" class="section">
        <h2>Ejercicios de Rehabilitación</h2>
        <div class="card-container" id="exercises-list">
            <!-- Dynamically populated -->
        </div>
    </section>

    <div class="chat-widget collapsed" id="chat-widget">
        <div class="chat-header" onclick="toggleChat()">
            <span>Chat con Fisioterapeuta</span>
            <button id="chat-toggle">▲</button>
        </div>
        <div class="chat-content">
            <div class="chat-body" id="chat-body"></div>
            <div class="chat-input">
                <input type="text" id="chat-msg" placeholder="Escribe tu mensaje...">
                <button onclick="sendMessage()">➤</button>
            </div>
        </div>
    </div>


    <script src="script.js"></script>
</body>
</html>
